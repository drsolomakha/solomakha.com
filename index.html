ние всех этапов лечения - моя главная цель 💯","title":"Почему со мной?","opened":true}],"padding":{"on":true,"bottom":3},"separator":true},"block_type_id":14,"block_type_name":"collapse","block_id":"b4242f2f80dc","addon_target":null},{"options":{"font":25,"text":"<b>С чем ко мне:</b>","color":"#495057","padding":{"on":true,"top":2,"bottom":2}},"block_type_id":1,"block_type_name":"text","block_id":"b3dc14138d40","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ Лапароскопическое удаление, иссечение очагов эндометриоза и эндометриоидных инфильтратов. \n\nПри лапароскопии хирург видит ткани и органы под большим (в 4-10 раз) увеличением. Поэтому можно увидеть и удалить даже небольшие и труднодоступные очаги эндометриоза. \nБережно и эффективно разделить сращения органов между собой, иссечь эндометриоз кишки и мочевого пузыря, не повредить сосуды, нервы и мочеточники.\n\nЛапароскопия это малоинвазивный, то есть более щадящий для тканей и органов способ операции.\n  \nМетодики, которые использую позволяют удалить часть пораженной эндометриозом кишки через естественные отверстия без больших разрезов.  ","title":"эндометриоз","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"b97be5d6496d","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ Лапароскопическая миомэктомия - удаление миоматозных узлов через небольшие 5-12 мм разрезы на животе. \n\nЛапароскопически можно безопасно удалить даже большие (более 8 см) узлы. \n\nПри крупных и множественных миомах временно пережимаю сосуды малого таза с целью уменьшения кровопотери во время операции. \n\nПреимущества лапароскопии перед операциями через большой разрез (лапаротомией)– это более быстрый и легкий восстановительный период и гораздо менее выраженный болевой синдром, хороший косметический эффект (после заживления в большинстве случаев рубцов практически не видно).\n\n✔️ Лапароскопическая экстирпация (удаление) матки. \n\nКак правило эта операция выполняется рожавшим женщинам старшего возраста, не планирующим беременность. \n\nМожно безопасно удалить матку даже больших размеров (более 12-14 недель условной беременности), с небольшой кровопотерей во время операции. ","title":"миома матки","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"b0e5e4003fb9","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ Лапароскопическое удаление кисты, опухоли яичника. \n\n❗️ Во время операции при удалении кисты или опухоли стараюсь максимально сохранить здоровую ткань яичника, запас яйцеклеток:\n\n- использую современные кровоостанавливающие средства\n\n- не шью и применяю минимальную биполярную прицельную коагуляцию (прижигание) для остановки кровотечения   ","title":"киста, опухоль яичника","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"ba69d4e9ff05","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25},"title":{"font":25}},"fields":[{"text":"✔️ комбинация лапароскопии с одномоментной гистероскопией, полное удаление рубцовой ткани и послойное ушивание раны на матке специальными нитями, позволяют достичь желаемый результат - Ваша безопасность во время беременности и родов. ","title":"несостоятельность рубца на матке","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"be4c509bf871","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ лапароскопические операции при опущении и выпадение матки и стенок влагалища \n\n✔️ операции со стороны влагалища и в комбинации с лапароскопией\n\n✔️ операции при выпадении влагалища после удаления матки, сложные и рецидивные случаи","title":"опущение органов малого таза","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"bb70372d22f3","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ возможность регулировки слинга (сетки) после операции повышает вероятность 100% результата\n","title":"недержание мочи","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"b0a019dfb50e","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ применяю нервосберегающие техники, выполняю органосохраняющие операции, при наличии такой возможности\n\n✔️оперативные вмешательства с целью сохранения фертильности \nНапример, транспозиция яичников перед выполнением высокодозной химио- и лучевой терапии.    \n\n","title":"рак тела матки, шейки матки, яичников","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"b2c3190aa505","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ уменьшение емкости влагалища\n\n✔️ пластика половых губ и капюшона клитора\n\n❗️  улучшение качества интимной жизни, психологический комфорт ","title":"эстетическая гинекология","opened":true}],"padding":{"on":true,"top":2,"bottom":2}},"block_type_id":14,"block_type_name":"collapse","block_id":"b2564a077967","addon_target":null},{"options":{"design":{"on":1,"text":{"font":25,"color":"#495057"},"title":{"font":25,"color":"#495057"}},"fields":[{"text":"✔️ полип, гиперплазия, миома, синехии, перегородка\n\n✔️ гистероскопия без разрушения девственной плевы\n\n✔
