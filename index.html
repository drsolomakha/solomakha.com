<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Соломаха Сергей Сергеевич | Гинеколог-хирург, онколог</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f7f7f7; /* Светло-серый фон страницы */
            --text-color: #2e2e2e;
            --accent-color: #4a7c7c; /* Приглушенный тиловый */
            --white: #ffffff;
            --font-family: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Навигация (центрованная) */
        nav {
            display: flex;
            justify-content: center; /* Центрируем всё меню */
            align-items: center;
            padding: 25px 5%;
            position: fixed;
            width: 100%;
            z-index: 1000;
            background: rgba(247, 247, 247, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0,0,0,0.05);
        }

        .logo {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-right: 40px; /* Отступ от лого до меню */
        }

        .menu { display: flex; gap: 30px; }
        .menu a {
            text-decoration: none;
            color: var(--text-color);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s;
        }
        .menu a:hover { color: var(--accent-color); }

        /* Главный блок - СЛОИ */
        .hero {
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: var(--bg-color);
        }

        /* Слой 1: Видео-фон (самый задний план) */
        .video-viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            overflow: hidden;
            /* Сдвигаем видео чуть в сторону */
            transform: translate(3%, 3%) scale(1.05);
        }

        .video-bg {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Делаем видео еле заметным и ч/б */
            filter: grayscale(1) opacity(0.06) brightness(1.1);
        }

        /* Слой 2: Контент (аватар + текст поверх видео) */
        .hero-content {
            z-index: 2; /* Поверх видео */
            text-align: center; /* Центрируем весь текст */
            display: flex;
            flex-direction: column;
            align-items: center; /* Центрируем аватар и блоки */
            max-width: 900px;
            padding: 100px 20px;
        }

        /* Аватар (Полноразмерный по центру) */
        .avatar-box {
            width: 100%;
            max-width: 500px; /* Максимальная ширина большого фото */
            margin-bottom: 40px;
            position: relative;
            opacity: 0;
            animation: fadeIn 1.5s forwards;
        }

        .avatar-box img {
            width: 100%;
            height: auto;
            object-fit: contain;
            image-rendering: -webkit-optimize-contrast; /* Максимальная резкость */
        }

        /* Текстовые блоки */
        .text-block {
            background: rgba(255, 255, 255, 0.7); /* Тонкая подложка для читаемости */
            padding: 30px;
            border-radius: 4px;
            backdrop-filter: blur(5px);
        }

        .fio {
            font-size: 28px; /* Оптимальный, не крупный размер */
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 10px;
            text-transform: uppercase;
            line-height: 1.2;
        }

        .specialization {
            font-size: 14px; /* Меньший размер */
            font-weight: 400;
            letter-spacing: 1px;
            color: #777; /* Серый */
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .slogan {
            font-size: 16px; /* Больший размер */
            font-weight: 600; /* Полужирный */
            letter-spacing: 2px;
            color: var(--accent-color);
            text-transform: lowercase;
            margin-bottom: 35px;
        }

        /* Обращение (Анимированное) */
        .appeal {
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1s forwards 0.8s;
            max-width: 600px;
            margin: 0 auto;
        }

        .appeal p {
            font-size: 16px;
            font-weight: 300;
            margin-bottom: 18px;
            color: rgba(0,0,0,0.8);
        }

        .bold-line { font-weight: 500; color: var(--text-color); }

        /* Подпись ( класический метод) */
        .signature-wrap {
            margin-top: 30px;
            opacity: 0;
            animation: fadeIn 2s forwards 2.5s;
        }

        .signature-img {
            height: 70px; /* Фиксированная высота */
            width: auto;
            /* Если signature.png (прозрачный) - ок. Если signature.jpg - фильтры ниже очистят фон */
            mix-blend-mode: multiply;
            filter: contrast(1.5) brightness(1.1) grayscale(1);
        }

        /* Кнопка */
        .btn {
            display: inline-block;
            margin-top: 40px;
            padding: 18px 45px;
            background-color: var(--accent-color);
            color: var(--white);
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn:hover { background-color: #3a6363; transform: translateY(-2px); }

        /* Анимации */
        @keyframes fadeIn { to { opacity: 1; } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 10px; padding: 15px; }
            .logo { margin-right: 0; }
            .menu { gap: 20px; }

            .hero { height: auto; padding: 100px 0; }
            .hero-content { padding: 40px 10px; }
            
            .avatar-box { max-width: 100%; padding: 0 10px; }
            .fio { font-size: 22px; }
            .specialization { font-size: 12px; }
            .slogan { font-size: 14px; }
            .appeal p { font-size: 14px; }
            
            .signature-img { height: 50px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><strong>С.С. СОЛОМАХА</strong></div>
        <div class="menu">
            <a href="#">Блог</a>
            <a href="https://prodoctorov.ru/spb/vrach/88335-solomaha/" target="_blank">Запись</a>
        </div>
    </nav>

    <section class="hero">
        <div class="video-viewport">
            <video autoplay muted loop playsinline class="video-bg">
                <source src="hero-video.mp4" type="video/mp4">
            </video>
        </div>

        <div class="hero-content">
            
            <div class="avatar-box">
                <img src="avatar.jpg" alt="Сергей Сергеевич Соломаха">
            </div>

            <div class="text-block">
                <h1 class="fio">Соломаха<br>Сергей Сергеевич</h1>
                <p class="specialization">Гинеколог-хирург, онколог • Санкт-Петербург</p>
                <p class="slogan">smart • safe • soft</p>
                
                <div class="appeal">
                    <p>Выбор хирурга — сложная задача.</p>
                    <p class="bold-line">Моя задача — ваше спокойствие, уверенность, эстетика и качество жизни.</p>
                    <p>Определенность в деталях.</p>
                    <p class="bold-line">Ваш хирург. Ваш результат.</p>
                    
                    <div class="signature-wrap">
                        <picture>
                            <source srcset="signature.png" type="image/png">
                            <img src="signature.jpg" alt="Подпись" class="signature-img">
                        </picture>
                    </div>
                </div>

                <a href="https://prodoctorov.ru/spb/vrach/88335-solomaha/" class="btn" target="_blank">Записаться на прием</a>
            </div>
        </div>
    </section>

</body>
</html>
